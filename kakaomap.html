<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100%; height: 100vh; overflow: hidden; }
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f64554cda618c224154ab4621b15243b"></script>
  <script>
    var mapObj = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(37.4807, 126.8820),
      level: 4
    });
    var overlays = [];

    setTimeout(function() {
      window.parent.postMessage({ type: 'mapReady' }, '*');
    }, 500);

    function drawOverlays(rList, cIds, kw) {
      overlays.forEach(function(o) { o.setMap(null); });
      overlays = [];
      var filteredIds = {};
      rList.forEach(function(r) {
        if (!kw || r.menu.some(function(m) { return m.name.indexOf(kw) !== -1; })) {
          filteredIds[r.id] = true;
        }
      });
      rList.forEach(function(r) {
        if (!r.lat || !r.lng) return;
        var isCompare = cIds.indexOf(r.id) !== -1;
        var isFiltered = !!filteredIds[r.id];
        var dimmed = kw && !isFiltered;
        var color = isCompare ? '#D4537E' : (r.open ? '#1D9E75' : '#888780');
        var content = '<div onclick="pinClick(' + r.id + ')" style="' +
          'background:' + color + ';color:#fff;padding:5px 10px;border-radius:20px;' +
          'font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;' +
          'opacity:' + (dimmed ? 0.3 : 1) + ';box-shadow:0 2px 6px rgba(0,0,0,0.25);' +
          'font-family:-apple-system,sans-serif;display:inline-block;">' +
          (isCompare ? '✓ ' : '') + r.name + '</div>';
        var overlay = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(r.lat, r.lng),
          content: content,
          yAnchor: 1.3
        });
        overlay.setMap(mapObj);
        overlays.push(overlay);
      });
    }

    function pinClick(id) {
      window.parent.postMessage({ type: 'pinClick', id: id }, '*');
    }

    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'updateMap') {
        drawOverlays(e.data.restaurants, e.data.compareIds, e.data.keyword);
      }
    });
  </script>
</body>
</html>
