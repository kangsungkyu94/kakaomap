<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100%; height: 100vh; overflow: hidden; }
    #map { width: 100%; height: 100%; }
    .legend {
      position: absolute; bottom: 12px; left: 12px;
      background: rgba(255,255,255,0.92); border-radius: 10px;
      padding: 8px 12px; font-size: 11px; color: #444;
      font-family: -apple-system, sans-serif; z-index: 10;
    }
    .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .legend-row:last-child { margin-bottom: 0; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  </style>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f64554cda618c224154ab4621b15243b&autoload=false"></script>
</head>
<body>
  <div id="map"></div>
  <div class="legend">
    <div class="legend-row"><span class="dot" style="background:#1D9E75"></span> 영업 중</div>
    <div class="legend-row"><span class="dot" style="background:#888780"></span> 준비 중</div>
    <div class="legend-row"><span class="dot" style="background:#D4537E"></span> 비교 선택</div>
  </div>
  <script>
    var overlays = [];
    var mapObj = null;

    kakao.maps.load(function() {
      mapObj = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(37.4807, 126.8820),
        level: 4
      });
      window.parent.postMessage({ type: 'mapReady' }, '*');
    });

    function drawOverlays(rList, cIds, kw) {
      if (!mapObj) return;
      overlays.forEach(function(o) { o.setMap(null); });
      overlays = [];
      var filteredIds = {};
      rList.forEach(function(r) {
        if (!kw || r.menu.some(function(m) { return m.name.indexOf(kw) !== -1; })) {
          filteredIds[r.id] = true;
        }
      });
      rList.forEach(function(r) {
        if (!r.lat || !r.lng) return;
        var isCompare = cIds.indexOf(r.id) !== -1;
        var isFiltered = !!filteredIds[r.id];
        var dimmed = kw && !isFiltered;
        var color = isCompare ? '#D4537E' : (r.open ? '#1D9E75' : '#888780');
        var content = '<div onclick="pinClick(' + r.id + ')" style="' +
          'background:' + color + ';color:#fff;padding:5px 10px;border-radius:20px;' +
          'font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;' +
          'opacity:' + (dimmed ? 0.3 : 1) + ';box-shadow:0 2px 6px rgba(0,0,0,0.25);' +
          'font-family:-apple-system,sans-serif;display:inline-block;">' +
          (isCompare ? '✓ ' : '') + r.name + '</div>';
        var overlay = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(r.lat, r.lng),
          content: content,
          yAnchor: 1.3
        });
        overlay.setMap(mapObj);
        overlays.push(overlay);
      });
    }

    function pinClick(id) {
      window.parent.postMessage({ type: 'pinClick', id: id }, '*');
    }

    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'updateMap') {
        drawOverlays(e.data.restaurants, e.data.compareIds, e.data.keyword);
      }
    });
  </script>
</body>
</html>
